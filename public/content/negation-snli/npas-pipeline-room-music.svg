<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">The sentence is tokenized with dependency labels and NPAS region assignments shown for every token. Two negation cues (never, without) are highlighted in coral and arcs connect them to their syntactic anchors (is, music). The region labels under is and music are coral; the region labels under other tokens are faded gray. A panel below shows the three cue-detection strategies, with token-rule matching highlighted as the one that fired.</desc>
